name: GroundWork Compatibility Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  groundwork-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run validation suite
      run: npm test

    - name: Generate JSON report
      id: scan_json
      continue-on-error: true
      run: npm run scan -- --format json --output baseline-report.json

    - name: Generate Markdown summary
      if: always()
      run: npm run scan -- --format markdown --output baseline-report.md || true
        
    - name: Upload compatibility report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: groundwork-compatibility-report
        path: |
          baseline-report.json
          baseline-report.md
        
    - name: Comment on PR
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const comment = fs.existsSync('baseline-report.md')
            ? fs.readFileSync('baseline-report.md', 'utf8')
            : 'GroundWork did not generate a markdown report.';
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
          
    - name: Fail on compatibility errors
      if: steps.scan_json.outcome == 'failure'
      run: |
        echo "GroundWork detected compatibility errors for the configured targets."
        exit 1
